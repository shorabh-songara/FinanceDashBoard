spring.application.name=FinanceApp

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO}
spring.jpa.show-sql=${JPA_SHOW_SQL}

jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION}

# ==========================================
# API ENDPOINTS
# ==========================================

# --- Auth Controller (/api/auth) ---
# POST   /api/auth/register              - Register a new user (Public)
# POST   /api/auth/login                 - Login and get JWT token (Public)

# --- User Controller (/api/users) ---
# POST   /api/users                      - Create a new user (ADMIN)
# GET    /api/users                      - Get all users with filters: search, role, status, page, size (ADMIN)
# GET    /api/users/inactive             - Get all inactive/pending users (ADMIN)
# GET    /api/users/{id}                 - Get user by ID (ADMIN)
# PUT    /api/users/{id}                 - Update user by ID (ADMIN)
# DELETE /api/users/{id}                 - Delete user by ID (ADMIN)

# --- Category Controller (/api/category) ---
# POST   /api/category                   - Create a new category (ADMIN)
# GET    /api/category/{id}              - Get category by ID (ADMIN, ANALYST, VIEWER)
# PUT    /api/category/{id}              - Update category by ID (ADMIN)
# DELETE /api/category/{id}              - Delete category by ID (ADMIN)

# --- Finance Record Controller (/api/records) ---
# POST   /api/records                    - Create a new record (ADMIN)
# GET    /api/records                    - Get all records with filters: categoryName, type, from, to, limit (ADMIN, ANALYST)
# PUT    /api/records/{id}               - Update record by ID (ADMIN)
# DELETE /api/records/{id}               - Soft delete record by ID (ADMIN, ANALYST)
# PATCH  /api/records/{id}/restore       - Restore a soft-deleted record (ADMIN)

# --- Dashboard Controller (/api/dashboard) ---
# GET    /api/dashboard/summary          - Get income, expense & balance summary (ADMIN, ANALYST, VIEWER)
# GET    /api/dashboard/CategoryTotal    - Get totals grouped by category (ADMIN, ANALYST, VIEWER)
# GET    /api/dashboard/monthlyTrend     - Get monthly trends, param: year (ADMIN, ANALYST, VIEWER)
# GET    /api/dashboard/weeklyTrend      - Get weekly trends, params: year, month (ADMIN, ANALYST)
# GET    /api/dashboard/recentActivity   - Get recent records, param: limit (ADMIN, ANALYST, VIEWER)